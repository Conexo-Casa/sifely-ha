add_passcode:
  name: Add passcode
  description: >
    Create a new guest passcode on a Sifely lock via the gateway.
    The lock must be online (gateway connected) for this to work.
  fields:
    lock_id:
      name: Lock ID
      description: >
        The numeric Sifely lock ID. Find it in the lock entity's attributes
        (lock_id) or in the Sifely app under lock settings.
      required: true
      example: 12345678
      selector:
        number:
          min: 1
          mode: box
    passcode:
      name: Passcode
      description: >
        The numeric passcode (typically 4–9 digits, e.g. "123456").
        Check your lock model's manual for length requirements.
      required: true
      example: "123456"
      selector:
        text:
    passcode_name:
      name: Passcode name
      description: >
        A label for this passcode so you can identify it later
        (e.g. "Guest - Jane Smith" or "Cleaner Wed").
      required: true
      example: "Guest - Jane Smith"
      selector:
        text:
    start_date:
      name: Start date/time (optional)
      description: >
        When the passcode becomes active, as a Unix timestamp in
        milliseconds. Leave blank to activate immediately.
      required: false
      example: 1700000000000
      selector:
        number:
          min: 0
          mode: box
    end_date:
      name: End date/time (optional)
      description: >
        When the passcode expires, as a Unix timestamp in milliseconds.
        Leave blank (or set to 0) for a permanent passcode.
      required: false
      example: 1700086400000
      selector:
        number:
          min: 0
          mode: box

change_passcode:
  name: Change passcode
  description: >
    Update an existing passcode on a lock. You can change the code itself,
    its name, and/or its validity window. Only the fields you supply are
    changed; omit any field to leave it as-is.
  fields:
    lock_id:
      name: Lock ID
      description: The numeric Sifely lock ID.
      required: true
      example: 12345678
      selector:
        number:
          min: 1
          mode: box
    passcode_id:
      name: Passcode ID
      description: >
        The numeric ID of the passcode to change. Use the list_passcodes
        service to find passcode IDs, or check the sifely_passcodes_listed
        event in the HA event log.
      required: true
      example: 99001
      selector:
        number:
          min: 1
          mode: box
    passcode:
      name: New passcode (optional)
      description: The new numeric passcode to set.
      required: false
      example: "654321"
      selector:
        text:
    passcode_name:
      name: New name (optional)
      description: A new label for the passcode.
      required: false
      example: "Guest - Updated"
      selector:
        text:
    start_date:
      name: New start date (optional)
      description: New activation timestamp in milliseconds.
      required: false
      selector:
        number:
          min: 0
          mode: box
    end_date:
      name: New end date (optional)
      description: New expiry timestamp in milliseconds (0 = permanent).
      required: false
      selector:
        number:
          min: 0
          mode: box

delete_passcode:
  name: Delete passcode
  description: >
    Permanently remove a passcode from a lock via the gateway.
    This cannot be undone.
  fields:
    lock_id:
      name: Lock ID
      description: The numeric Sifely lock ID.
      required: true
      example: 12345678
      selector:
        number:
          min: 1
          mode: box
    passcode_id:
      name: Passcode ID
      description: >
        The numeric ID of the passcode to delete. Use the list_passcodes
        service to find passcode IDs.
      required: true
      example: 99001
      selector:
        number:
          min: 1
          mode: box

list_passcodes:
  name: List passcodes
  description: >
    Retrieve all passcodes for a lock and log them. Results are written to
    the Home Assistant log at INFO level, and also fired as a
    sifely_passcodes_listed event (useful in automations).
  fields:
    lock_id:
      name: Lock ID
      description: The numeric Sifely lock ID.
      required: true
      example: 12345678
      selector:
        number:
          min: 1
          mode: box
